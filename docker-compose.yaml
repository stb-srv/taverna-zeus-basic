# Docker-Compose-Deployment für Coolify.
#
# Warum Compose statt „Build Pack: Dockerfile"?
# Coolify liest bei einem reinen Dockerfile-Deploy KEINE .env(.example) ein.
# Beim Build Pack „Docker Compose" dagegen parst Coolify diese Datei, findet
# jede ${VARIABLE}-Referenz und legt daraus automatisch ein EDITIERBARES Feld
# im Tab „Environment Variables" an. Coolify schreibt die eingetragenen Werte
# in eine .env, die docker compose beim Build und zur Laufzeit einliest.
#
# Lokal:  docker compose up --build   (Werte aus einer .env neben dieser Datei)
#
# WICHTIG zu den scheinbar doppelten Feldern in Coolify: Für jede Variable aus
# `build.args` (unten) legt Coolify im Tab „Environment Variables" ZWEI
# Zeilen an — eine mit Häkchen „Available at Buildtime" (das ist die einzig
# wirksame für NEXT_PUBLIC_*, da diese Werte nur beim `next build` ins Bundle
# eingebacken werden) und eine zweite, rein für die Laufzeit (`environment:`),
# die von Next.js nie gelesen wird. Nur die Buildtime-Zeile ausfüllen; die
# Runtime-Zeile für dieselbe Variable leer lassen bzw. ignorieren. Ein falscher
# Wert in der Buildtime-Zeile (z. B. ein alter/rotierter Anon-Key oder aus
# Versehen der Service-Role-Key) fällt NICHT sofort auf, weil bereits gecachte
# Seiten (Disk-Cache) weiter funktionieren — betrifft aber sofort jede neue
# Supabase-Anfrage (z. B. RLS-Fehler 42501 beim Kontaktformular-Insert, leere
# Bewertungen). Nach jeder Änderung an einer Buildtime-Variable: „Redeploy"
# mit tatsächlichem Rebuild auslösen, ein reiner Container-Restart genügt
# nicht (der Wert steckt im bereits gebauten Image).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* werden beim `next build` fest ins Client-Bundle eingebacken
      # und MÜSSEN daher schon zur Build-Zeit vorliegen. Explizit als ${VAR}
      # interpolieren (nicht als bloßer Name): Coolifys UI erkennt Variablen nur
      # an der ${VAR}-Schreibweise und markiert bloße Namen sonst als "hardcoded",
      # obwohl sie funktional aus der Umgebung aufgelöst würden.
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        # Coolify legt für den Service "app" automatisch SERVICE_FQDN_APP an
        # (nackte Domain, ohne Schema), sobald in der UI eine Domain gesetzt
        # ist — spart das manuelle Doppelt-Eintragen der Domain. Explizites
        # NEXT_PUBLIC_SITE_URL (falls in Coolify gesetzt) hat immer Vorrang,
        # z. B. für lokales `docker compose up --build` ohne Coolify.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://${SERVICE_FQDN_APP}}
        # Fixe Server-Actions-Verschlüsselung über Deploys hinweg — ohne das
        # bekommt jeder Client, der beim nächsten Deploy noch eine alte Seite
        # offen hat, "Failed to find Server Action" beim Absenden eines
        # Formulars. Einmalig generieren (openssl rand -base64 32) und als
        # Coolify-Secret dauerhaft setzen, NIE danach ändern.
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    environment:
      # ${VAR} -> erzeugt ein editierbares Feld in der Coolify-UI.
      # NEXT_PUBLIC_* absichtlich NICHT hier wiederholen: Next.js baut diese
      # Werte beim `next build` fest in den JS-Code ein (Client UND Server) und
      # liest sie zur Laufzeit nie aus process.env. Ein zweiter Eintrag hier
      # würde in Coolify nur ein doppeltes, verwirrendes Feld erzeugen (siehe
      # build.args oben – dort ist der einzige Ort, an dem der Wert gebraucht wird).
      #
      # Server-only Geheimnis mit vollen DB-Rechten – NIE mit NEXT_PUBLIC_-Prefix.
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # LibreTranslate (optional). :- = editierbares Feld mit leerem Default,
      # bleibt also nicht als Pflichtfeld rot. Leer -> Fallback http://localhost:5000.
      - LIBRETRANSLATE_URL=${LIBRETRANSLATE_URL:-}
      - LIBRETRANSLATE_API_KEY=${LIBRETRANSLATE_API_KEY:-}
      # SMTP für Kontaktformular-Benachrichtigungen (optional, best-effort —
      # ohne SMTP_HOST/CONTACT_NOTIFY_EMAIL wird der Versand einfach übersprungen).
      # Nur noch Fallback: im Admin unter „Standort & Kontakt" eingetragene
      # Werte (Tabelle smtp_settings) haben Vorrang, siehe src/lib/mail.ts.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - CONTACT_NOTIFY_EMAIL=${CONTACT_NOTIFY_EMAIL:-}
    # Coolify routet über seinen Proxy auf diesen Container-Port (Domain in der UI setzen).
    expose:
      - "3000"
    # Cache der UI-Texte (src/i18n/ui-messages-cache.ts) als Fallback, falls
    # Supabase mal nicht erreichbar ist. Named Volume statt reinem
    # Container-Dateisystem, damit der Cache auch einen Redeploy übersteht
    # (Coolify erstellt beim Docker-Compose-Deploy automatisch persistenten
    # Storage für jedes hier deklarierte Volume — kein manueller Schritt in
    # der Coolify-UI nötig).
    volumes:
      - ui_messages_cache:/app/.cache
    healthcheck:
      # Node ist im Image garantiert vorhanden (anders als curl; wget nur via
      # busybox). fetch ist in Node 22 global. Exit 0 nur bei HTTP 2xx.
      # Traefik routet erst, wenn der Container „healthy" meldet.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # --- LibreTranslate (optional) ------------------------------------------
  # Auskommentiert lassen, wenn du LibreTranslate als eigenen Coolify-Service
  # betreibst. Zum Mitstarten hier einkommentieren und oben
  # LIBRETRANSLATE_URL=http://libretranslate:5000 setzen.
  #
  # libretranslate:
  #   image: libretranslate/libretranslate:latest
  #   restart: unless-stopped
  #   environment:
  #     # Nur diese Sprachmodelle laden (RAM sparen). Muss alle Codes enthalten,
  #     # die unter /admin/translations aktiviert werden – siehe src/i18n/routing.ts.
  #     LT_LOAD_ONLY: "ar,de,el,en,es,nl,pl,ru,fr,it,tr,pt,cs,da,sv,uk,ro,hu,zh,ja"
  #     LT_API_KEYS: "false"
  #   expose:
  #     - "5000"
  #   volumes:
  #     - libretranslate_models:/home/libretranslate/.local

volumes:
  ui_messages_cache:
  # libretranslate_models:
